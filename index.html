<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandsfreeOSC — Hand Tracking to OSC</title>
  <meta name="description" content="Hand tracking via HandsfreeJS + fingerpose, sends OSC data over WebSocket bridge." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- HandsfreeJS -->
  <link rel="stylesheet" href="https://unpkg.com/handsfree@8.5.1/build/lib/assets/handsfree.css" />
  <script src="https://unpkg.com/handsfree@8.5.1/build/lib/handsfree.js"></script>

  <!-- fingerpose (for curl + direction per finger) -->
  <script src="https://cdn.jsdelivr.net/npm/fingerpose@0.1.0/dist/fingerpose.min.js"></script>

  <!-- p5.js (for custom minimalist UI rendering) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="sketch.js" defer></script>

  <!-- App logic & Styles -->
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>

<div class="app">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div>
      <div class="logo">✋ HandsfreeOSC</div>
      <div class="logo-sub">Hand tracking → WebSocket → UDP/OSC</div>
    </div>
    <div class="header-spacer"></div>
    <div id="fps-badge">— fps</div>
    <div id="status-badge" class="disconnected">
      <span class="dot"></span>
      <span id="status-text">WS Disconnected</span>
    </div>
  </header>

  <!-- ── Camera view & P5 overlay ───────────────────────────────────────── -->
  <main>
    <div id="camera-wrap">
      <div id="p5-wrap"></div>
    </div>
  </main>

  <!-- ── Sidebar ────────────────────────────────────────────────────────── -->
  <aside>
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
        <div class="panel-title" style="margin-bottom: 0;">Configuration</div>
        <button id="btn-fullscreen" class="btn" style="padding: 4px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted);" title="Toggle Fullscreen">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
          </svg>
        </button>
      </div>
      <div class="field">
        <label>WebSocket Server</label>
        <div class="field-row">
          <input type="text" id="ws-host" value="localhost" placeholder="host" />
          <input type="number" id="ws-port" value="8080" min="1" max="65535" />
        </div>
      </div>
      <div class="field">
        <label>OSC Target (on server)</label>
        <div class="field-row">
          <input type="text" id="osc-host" value="127.0.0.1" placeholder="host" />
          <input type="number" id="osc-port" value="57120" min="1" max="65535" />
        </div>
      </div>
      <div class="field">
        <label>Send Rate (fps cap)</label>
        <div class="slider-wrap">
          <input type="range" id="fps-slider" min="1" max="60" value="30" />
          <span class="slider-val" id="fps-slider-val">30</span>
        </div>
        <div style="margin-top: 8px; display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="check-autofps" style="width: 14px; height: 14px; accent-color: var(--accent);" />
          <label for="check-autofps" style="margin-bottom: 0; cursor: pointer;">Auto FPS (Match tracking speed)</label>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-start">▶ Start</button>
        <button class="btn btn-danger" id="btn-stop" disabled>■ Stop</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Curl State</div>
      <div class="finger-bars">
        <div class="finger-bar-wrap">
          <div class="finger-bar-track"><div class="finger-bar-fill" id="bar-thumb"></div></div>
          <div class="finger-bar-lbl">Th</div>
        </div>
        <div class="finger-bar-wrap">
          <div class="finger-bar-track"><div class="finger-bar-fill" id="bar-index"></div></div>
          <div class="finger-bar-lbl">Ix</div>
        </div>
        <div class="finger-bar-wrap">
          <div class="finger-bar-track"><div class="finger-bar-fill" id="bar-middle"></div></div>
          <div class="finger-bar-lbl">Md</div>
        </div>
        <div class="finger-bar-wrap">
          <div class="finger-bar-track"><div class="finger-bar-fill" id="bar-ring"></div></div>
          <div class="finger-bar-lbl">Rg</div>
        </div>
        <div class="finger-bar-wrap">
          <div class="finger-bar-track"><div class="finger-bar-fill" id="bar-pinky"></div></div>
          <div class="finger-bar-lbl">Pk</div>
        </div>
      </div>
    </div>

    <div class="panel" style="flex:1; display: flex; flex-direction: column;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
        <div class="panel-title" style="margin-bottom: 0;">Live OSC Data</div>
        <button class="btn" id="btn-toggle-osc" style="padding: 4px 10px; font-size: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--muted);">
          Hide Table
        </button>
      </div>
      <div class="osc-table" id="osc-table">
        <!-- populated by app.js -->
      </div>
    </div>

    <div id="log-strip">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span id="log-text">Ready.</span>
        <a href="https://github.com/carlesgutierrez/" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 10px; opacity: 0.8; transition: opacity 0.2s;">dev ref ↗</a>
      </div>
    </div>
  </aside>
</div>

</body>
</html>
